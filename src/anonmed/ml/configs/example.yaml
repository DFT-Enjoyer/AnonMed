# Example pipeline configuration for AnonMed ML evaluation.
# Save as configs/example.yaml (or any name), and run:
#   python -m anonmed.ml.pipelines.run_evaluation configs/example.yaml

run:
  # Optional run name for logging/organization.
  name: "example_evaluation"

dataset:
  # Identifier registered in DATASET_BUILDERS (see registry.py).
  id: "russian_pii_66k"
  # Parameters passed to the dataset constructor (e.g., RussianPIIDataset).
  params:
    sample_size: 1000        # number of examples to load
    random_seed: 42          # for reproducibility

model:
  # Identifier registered in MODEL_BUILDERS.
  id: "natasha_per"
  # Parameters for the model (if any).
  params: {}                 # empty dict means no params

metrics:
  # List of metrics to compute. Each can be a string (id only) or a mapping with params.
  - id: "entity_hard_f1"
    params: {}               # optional, specific to metric
  - id: "char_hard_f1"
    # no params needed, but can be omitted entirely
  # More metrics can be added:
  # - id: "entity_soft_f1"
  # - id: "coverage_percent"

training:
  # Whether to run training phase (if model implements TrainablePIIModel).
  enabled: false
  # Optional trainer identifier (e.g., "simple_trainer").
  trainer: null
  # Training hyperparameters (unused if enabled=false).
  params: {}

evaluation:
  # Whether to run evaluation after training (or standalone).
  enabled: true

outputs:
  # Directory where artifacts (report, dataset snapshots) will be saved.
  artifacts_dir: "artifacts"
  # Filename for the evaluation report (JSON).
  report_filename: "report.json"
  # Whether to write a human-readable JSON snapshot of the whole dataset.
  write_dataset_snapshot_json: true
  # Whether to write a Parquet snapshot (more efficient for large data).
  write_dataset_snapshot_parquet: false
